<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated Transformer architecture flow</title>
  <desc id="desc">An animated visual showing tokens flowing through embeddings, attention, encoder, decoder, and logits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.52" stop-color="#243B53"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="panel" x1="180" y1="80" x2="1020" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .label { font: 700 15px Arial, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .small { font: 500 12px Arial, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .box { fill: rgba(15, 23, 42, 0.72); stroke: rgba(255,255,255,0.34); stroke-width: 1.4; }
      .line { stroke: #BAE6FD; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 12 14; animation: dash 2.2s linear infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .pulse2 { animation: pulse 2.4s ease-in-out infinite 0.45s; transform-box: fill-box; transform-origin: center; }
      .pulse3 { animation: pulse 2.4s ease-in-out infinite 0.9s; transform-box: fill-box; transform-origin: center; }
      .float { animation: float 4s ease-in-out infinite; }
      .float2 { animation: float 4s ease-in-out infinite 1s; }
      .spark { fill: #FDE68A; filter: url(#glow); animation: blink 1.8s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -52; } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.82; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes blink {
        0%, 100% { opacity: 0.25; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @media (prefers-reduced-motion: reduce) {
        .line, .pulse, .pulse2, .pulse3, .float, .float2, .spark { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="22" fill="url(#bg)"/>
  <path d="M-40 308 C180 226 262 362 470 276 C670 193 728 83 936 125 C1065 151 1117 119 1248 62" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="36"/>
  <path d="M-20 72 C184 149 286 12 463 91 C628 164 686 270 890 223 C1035 190 1099 219 1228 287" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="28"/>
  <rect x="154" y="88" width="892" height="188" rx="18" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <text x="600" y="58" text-anchor="middle" class="title">Transformer for Professionals</text>
  <text x="600" y="318" text-anchor="middle" class="subtitle">from tokens to attention to logits, with every tensor shape kept visible</text>

  <g class="float">
    <rect x="70" y="142" width="126" height="78" rx="12" class="box"/>
    <text x="133" y="174" text-anchor="middle" class="label">TOKENS</text>
    <text x="133" y="196" text-anchor="middle" class="small">(B, T)</text>
  </g>

  <g class="pulse">
    <rect x="252" y="124" width="142" height="114" rx="14" class="box"/>
    <text x="323" y="166" text-anchor="middle" class="label">EMBED</text>
    <text x="323" y="188" text-anchor="middle" class="small">token + position</text>
    <text x="323" y="209" text-anchor="middle" class="small">(B, T, d_model)</text>
  </g>

  <g class="pulse2">
    <rect x="450" y="112" width="154" height="138" rx="14" class="box"/>
    <text x="527" y="151" text-anchor="middle" class="label">ATTENTION</text>
    <text x="527" y="174" text-anchor="middle" class="small">Q K V</text>
    <circle cx="493" cy="205" r="10" fill="#38BDF8"/>
    <circle cx="527" cy="205" r="10" fill="#F59E0B"/>
    <circle cx="561" cy="205" r="10" fill="#34D399"/>
  </g>

  <g class="pulse3">
    <rect x="660" y="124" width="142" height="114" rx="14" class="box"/>
    <text x="731" y="166" text-anchor="middle" class="label">ENCODER</text>
    <text x="731" y="188" text-anchor="middle" class="small">self-attn + FFN</text>
    <text x="731" y="209" text-anchor="middle" class="small">stacked layers</text>
  </g>

  <g class="float2">
    <rect x="858" y="124" width="142" height="114" rx="14" class="box"/>
    <text x="929" y="166" text-anchor="middle" class="label">DECODER</text>
    <text x="929" y="188" text-anchor="middle" class="small">mask + cross-attn</text>
    <text x="929" y="209" text-anchor="middle" class="small">autoregressive</text>
  </g>

  <g class="float">
    <rect x="1054" y="142" width="116" height="78" rx="12" class="box"/>
    <text x="1112" y="174" text-anchor="middle" class="label">LOGITS</text>
    <text x="1112" y="196" text-anchor="middle" class="small">(B, T, V)</text>
  </g>

  <path class="line" d="M202 181 H246"/>
  <path class="line" d="M400 181 H444"/>
  <path class="line" d="M610 181 H654"/>
  <path class="line" d="M808 181 H852"/>
  <path class="line" d="M1006 181 H1048"/>

  <circle class="spark" cx="227" cy="181" r="5"/>
  <circle class="spark" cx="424" cy="181" r="5" style="animation-delay:0.35s"/>
  <circle class="spark" cx="632" cy="181" r="5" style="animation-delay:0.7s"/>
  <circle class="spark" cx="830" cy="181" r="5" style="animation-delay:1.05s"/>
  <circle class="spark" cx="1027" cy="181" r="5" style="animation-delay:1.4s"/>
</svg>
